name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.0)'
        required: true
        default: 'v1.2.0'

env:
  IDF_VERSION: v5.4.1
  ESP_MATTER_REF: release/v1.4.2
  TARGET: esp32c6
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git wget curl flex bison gperf \
            python3 python3-pip python3-venv python3-setuptools \
            cmake ninja-build ccache \
            libffi-dev libssl-dev libusb-1.0-0 \
            dfu-util

      - name: Cache ESP-IDF tools
        uses: actions/cache@v4
        with:
          path: ~/.espressif
          key: espressif-tools-${{ env.IDF_VERSION }}-${{ env.TARGET }}

      - name: Install ESP-IDF
        run: |
          git clone --depth 1 --branch ${{ env.IDF_VERSION }} \
            https://github.com/espressif/esp-idf.git $HOME/esp-idf
          $HOME/esp-idf/install.sh ${{ env.TARGET }}

      - name: Cache ESP-Matter bootstrap
        id: cache-esp-matter
        uses: actions/cache@v4
        with:
          path: $HOME/esp-matter
          key: esp-matter-${{ env.ESP_MATTER_REF }}-idf-${{ env.IDF_VERSION }}-v1

      - name: Clone ESP-Matter
        if: steps.cache-esp-matter.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.ESP_MATTER_REF }} \
            https://github.com/espressif/esp-matter.git $HOME/esp-matter
          cd $HOME/esp-matter
          git submodule update --init --depth 1 connectedhomeip/connectedhomeip
          # Init all direct submodules of connectedhomeip so bootstrap.sh
          # integrity checks pass (it fails if any submodule shows "has changes")
          cd connectedhomeip/connectedhomeip
          git submodule update --init --depth 1

      - name: Bootstrap ESP-Matter
        if: steps.cache-esp-matter.outputs.cache-hit != 'true'
        run: |
          source $HOME/esp-idf/export.sh
          cd $HOME/esp-matter
          bash install.sh --no-host-tool

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build firmware
        run: |
          source $HOME/esp-idf/export.sh
          source $HOME/esp-matter/export.sh
          cd source/shelly-1-mini-gen4/light
          idf.py \
            -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.c6_thread_shelly" \
            set-target ${{ env.TARGET }}
          idf.py build

      - name: Merge binary
        run: |
          source $HOME/esp-idf/export.sh
          VERSION=${{ steps.version.outputs.version }}
          cd source/shelly-1-mini-gen4/light
          esptool.py --chip esp32c6 merge_bin \
            -o "shelly-1-mini-gen4-light-${VERSION}.bin" \
            --flash_mode dio \
            --flash_size 8MB \
            0x0     build/bootloader/bootloader.bin \
            0x10000 build/partition_table/partition-table.bin \
            0x11000 build/ota_data_initial.bin \
            0x20000 build/light.bin
          echo "Binary size: $(du -h shelly-1-mini-gen4-light-${VERSION}.bin | cut -f1)"

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.version }}
          path: source/shelly-1-mini-gen4/light/shelly-1-mini-gen4-light-${{ steps.version.outputs.version }}.bin
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: |
            ## Shelly 1 Mini Gen4 — Matter over Thread ${{ steps.version.outputs.version }}

            Ported from [automatous-io/shelly-1-gen4-matter-thread](https://github.com/automatous-io/shelly-1-gen4-matter-thread) for the **Shelly 1 Mini Gen4 (S4SW-001X8EU)**.

            ### Flashing

            Download `shelly-1-mini-gen4-light-${{ steps.version.outputs.version }}.bin` and flash at offset `0x0`.
            See [docs/FLASHING.md](docs/FLASHING.md) for full instructions.

            ### GPIO mapping (Shelly 1 Mini Gen4)

            | Function | GPIO |
            |---|---|
            | Relay | GPIO5, active-high |
            | Button | GPIO4, active-low |
            | Switch input | GPIO10 |
            | Status LED | GPIO0, active-low |
          files: source/shelly-1-mini-gen4/light/shelly-1-mini-gen4-light-${{ steps.version.outputs.version }}.bin
          draft: false
          prerelease: false
